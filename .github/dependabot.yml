# Keeps dependencies and GitHub Actions up to date with weekly PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # Batch low-risk minor/patch bumps into a single PR to cut review noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
